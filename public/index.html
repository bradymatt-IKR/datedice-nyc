// ── DATE/TIME/SEASON ──
function formatDate(d){return d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});}
function getTimeOfDay(){const h=new Date().getHours();if(h<6)return"Late Night";if(h<12)return"Morning";if(h<17)return"Afternoon";if(h<21)return"Evening";return"Late Night";}
function getSeason(){const m=new Date().getMonth();if(m>=2&&m<=4)return"Spring";if(m>=5&&m<=7)return"Summer";if(m>=8&&m<=10)return"Fall";return"Winter";}
function getDateRangeLabel(q){
  const now=new Date(),day=now.getDay();
  const fmt=d=>d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
  if(q==="tonight")return"Tonight, "+fmt(now);
  if(q==="this week"){const e=new Date(now);e.setDate(e.getDate()+(7-day));return fmt(now)+" – "+fmt(e);}
  if(q==="this weekend"){const s=new Date(now);s.setDate(s.getDate()+(6-day));const su=new Date(s);su.setDate(su.getDate()+1);return fmt(s)+" – "+fmt(su);}
  if(q==="next week"){const m2=new Date(now);m2.setDate(m2.getDate()+(8-day));const su=new Date(m2);su.setDate(su.getDate()+6);return fmt(m2)+" – "+fmt(su);}
  return"";
}

function classifyWeather(tempF,code,humidity,wind){
  if([95,96,99].includes(code))return"Stormy";if([71,73,75,77,85,86].includes(code))return"Snowy";
  if([51,53,55,56,57,61,63,65,66,67,80,81,82].includes(code))return"Rainy";if([45,48].includes(code))return"Foggy";
  if(tempF<=25)return"Frigid";if(tempF<=40)return"Cold";if(tempF>=90)return"Hot";if(wind>=25)return"Windy";
  if(code<=1&&tempF>=65)return"Sunny";if(code<=1)return"Mild";if(code===2)return"Partly Cloudy";if(code===3)return"Cloudy";
  return tempF>=65?"Sunny":"Mild";
}
function weatherToFilter(c){return{Sunny:"Sunny",Hot:"Hot",Mild:"Sunny","Partly Cloudy":"Cloudy",Cloudy:"Cloudy",Windy:"Windy",Foggy:"Cloudy",Rainy:"Rainy",Stormy:"Rainy",Snowy:"Snowy",Cold:"Cold",Frigid:"Cold"}[c]||"Any Weather";}

// ── API PROXY ──
const API_URL="/api/search";

async function fetchSuggestion(type,filters,usedNames){
  const{timeOfDay,weather,vibe,budget,duration,neighborhood,cuisine,activityType}=filters;
  const season=getSeason(),today=formatDate(new Date());
  const avoidList=(usedNames||[]).slice(-40).join(", ");
  const neighborhoodStr=neighborhood||"anywhere in NYC or nearby";
  let prompt;
  if(type==="food"){
    const cuisineStr=cuisine||"any cuisine — surprise us";
    prompt="You are a NYC restaurant and bar expert with deep knowledge of every neighborhood. Suggest ONE specific real restaurant, bar, café, bakery, or food experience matching these criteria:\n- Neighborhood: "+neighborhoodStr+"\n- Cuisine preference: "+cuisineStr+"\n- Time of day: "+(timeOfDay||"any")+"\n- Current weather: "+(weather||"any")+" (suggest cozy/indoor spots for rainy/cold, outdoor/rooftop for sunny/warm)\n- Vibe: "+(vibe||"any")+"\n- Budget: "+(budget||"any")+" (Free=free tastings/events, Under $50=casual, $50-150=mid-range, $150-300=upscale, Splurge=$300+ per person)\n- Duration: "+(duration||"any")+"\n- Season: "+season+"\n- Today: "+today+"\n"+(avoidList?"- AVOID these (already suggested): "+avoidList:"")+"\n\nPick a REAL, currently-operating place. Favor hidden gems, neighborhood favorites, new openings, and spots with character over obvious tourist places. Include specific dishes to order.\n\nRespond with ONLY a JSON object, no markdown, no backticks:\n{\"name\":\"...\",\"desc\":\"One vivid sentence about what makes this place special and what to order\",\"area\":\"Neighborhood\",\"address\":\"Full street address\",\"cat\":\"Food & Drink\",\"priceRange\":\"$/$$/$$$/$$$$\",\"cuisine\":\"Cuisine type\",\"emoji\":\"fitting food/drink emoji\",\"tip\":\"One insider tip for this specific place\"}";
  } else {
    const actTypeStr=activityType||"any type of activity or experience";
    prompt="You are a NYC experiences expert who knows every hidden gem, seasonal event, and unique activity. Suggest ONE specific real activity, experience, or place to visit matching these criteria:\n- Type: "+actTypeStr+"\n- Neighborhood: "+neighborhoodStr+"\n- Time of day: "+(timeOfDay||"any")+"\n- Current weather: "+(weather||"any")+" (suggest indoor activities for rainy/cold, outdoor for sunny)\n- Vibe: "+(vibe||"any")+"\n- Budget: "+(budget||"any")+" (Free, Under $50, $50-150, $150-300, Splurge=$300+)\n- Duration: "+(duration||"any")+"\n- Season: "+season+" (consider seasonal events, holiday activities, weather-appropriate picks)\n- Today: "+today+"\n"+(avoidList?"- AVOID these (already suggested): "+avoidList:"")+"\n\nSuggest a REAL, specific, currently-available experience. This could be a specific museum exhibit, a park activity, a class, a show, an immersive experience, a walking route, a seasonal event, a sporting event, a spa, a day trip — anything that makes for a great date. Be creative and specific. Search for what's currently available.\n\nRespond with ONLY a JSON object, no markdown, no backticks:\n{\"name\":\"...\",\"desc\":\"One vivid sentence about what makes this experience special and why it's great for a date\",\"area\":\"Neighborhood or location\",\"address\":\"Address if applicable, or general area\",\"cat\":\"Activity\",\"emoji\":\"fitting emoji\",\"tip\":\"One insider tip\"}";
  }
  try{
    const resp=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,tools:[{type:"web_search_20250305",name:"web_search"}],messages:[{role:"user",content:prompt}]})});
    if(!resp.ok)return null;
    const data=await resp.json();
    const text=(data.content||[]).map(function(b){return b.text||"";}).join("");
    const clean=text.replace(/```json|```/g,"").trim();
    const match=clean.match(/\{[\s\S]*\}/);
    if(match)return JSON.parse(match[0]);
  }catch(err){console.error("Engine error:",err);}
  return null;
}

async function fetchMultiple(type,filters,count,usedNames){
  const promises=[];
  for(let i=0;i<count;i++){promises.push(fetchSuggestion(type,filters,usedNames));}
  const settled=await Promise.allSettled(promises);
  const results=[],seen=new Set((usedNames||[]).map(function(n){return n.toLowerCase();}));
  settled.forEach(function(s){
    if(s.status==="fulfilled"&&s.value&&s.value.name){
      const key=s.value.name.toLowerCase();
      if(!seen.has(key)){seen.add(key);results.push(s.value);}
    }
  });
  return results;
}

const MiniCalendar=({history})=>{
  const[vd,setVd]=useState(new Date());
  const y=vd.getFullYear(),m=vd.getMonth(),fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),today=new Date();

  const dm={};history.forEach(function(h){const d=new Date(h.lockedAt||h.completedAt);const k=d.getFullYear()+"-"+d.getMonth()+"-"+d.getDate();if(!dm[k])dm[k]=[];dm[k].push(h);});
  const cells=[];for(let i=0;i<fd;i++)cells.push(<div key={"e"+i}/>);
  for(let d=1;d<=dim;d++){const k=y+"-"+m+"-"+d,entries=dm[k]||[],isToday=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
    cells.push(<div key={d} style={{textAlign:"center",padding:"6px 2px",borderRadius:"10px",position:"relative",background:isToday?P.goldDim:"transparent",color:entries.length>0?P.gold:P.textDim,fontFamily:sans,fontSize:"13px"}}>{d}{entries.length>0&&<div style={{position:"absolute",bottom:"2px",left:"50%",transform:"translateX(-50%)",display:"flex",gap:"2px"}}>{entries.map(function(_,i){return <div key={i} style={{width:"4px",height:"4px",borderRadius:"50%",background:_.status==="completed"?P.green:P.gold}}/>;})}</div>}</div>);}

                  {h.rating&&<div style={{fontSize:"13px",marginTop:"4px"}}>{"⭐".repeat(h.rating)}</div>}
                  <div style={{display:"flex",gap:"6px",marginTop:"10px",flexWrap:"wrap",alignItems:"center"}}>
                    {h.status==="locked"&&<div style={{display:"flex",gap:"4px",alignItems:"center"}}><span style={{fontSize:"11px",color:P.textDim,fontFamily:sans,marginRight:"2px"}}>Rate:</span>{[1,2,3,4,5].map(function(r){return(<button key={r} onClick={function(){markComplete(h.id,r);}} style={{background:"none",border:"1px solid "+P.border,borderRadius:"6px",padding:"3px 6px",cursor:"pointer",fontSize:"11px",lineHeight:1}}>{"★".repeat(r)}</button>);})}</div>}
                    <button onClick={function(){removeEntry(h.id);}} style={{background:"none",border:"none",color:P.textDim,fontSize:"12px",cursor:"pointer",fontFamily:sans,marginLeft:"auto"}}>Remove</button>
                  </div>
                </div>
              </div>
            </div>
          );})}
        </div>
      </div>)}
    </div>
    <NavBar tab={tab} setTab={function(t){setTab(t);if(t==="roll")setSubScreen("filters");}} historyCount={history.filter(function(h){return h.status==="locked";}).length}/>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<DateDice/>);
  </script>
</body>
</html>
